<div class="tab-content">
  <div class="form-group" style="grid-column: 1 / -1;">
    <h4>Discord 集成</h4>
    <p class="form-control-label desc">通过 Webhook 将服务器状态更新发送到 Discord 频道。</p>
  </div>

  <div class="settings-section">
    <h5>通用设置</h5>
    
    <div class="form-group">
      <label class="form-control-label toggle-label">
        <input type="checkbox" 
               class="toggle-switch" 
               [(ngModel)]="enabled" 
               (change)="onSaveSettings()" 
               [disabled]="isLocked" 
               tabindex="0" />
        <span class="slider"></span>
        <span class="toggle-text">启用 Discord 通知</span>
      </label>
    </div>

    <div class="form-group" *ngIf="enabled">
      <label class="form-control-label">Webhook URL</label>
      <input 
        type="text" 
        class="form-control input" 
        [(ngModel)]="webhookUrl"
        (blur)="onSaveSettings()" 
        [disabled]="isLocked" 
        placeholder="https://discord.com/api/webhooks/..."
      >
      <div class="form-control-label desc">
        Create a Webhook in your Discord Server Settings > Integrations > Webhooks.
      </div>
    </div>
  </div>

  <div *ngIf="enabled" class="settings-section">
    <h5>通知事件</h5>
    <p class="section-desc">选择哪些事件应触发 Discord 通知。</p>

    <div class="form-group">
      <div class="toggle-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
        
        <div class="toggle-label">
          <input type="checkbox" class="toggle-switch" [(ngModel)]="notifications.serverStart" (change)="onSaveSettings()" [disabled]="isLocked" />
          <span class="toggle-text">服务器启动</span>
        </div>

        <div class="toggle-label">
          <input type="checkbox" class="toggle-switch" [(ngModel)]="notifications.serverStop" (change)="onSaveSettings()" [disabled]="isLocked" />
          <span class="toggle-text">服务器停止 / 关闭</span>
        </div>

        <div class="toggle-label">
          <input type="checkbox" class="toggle-switch" [(ngModel)]="notifications.serverCrash" (change)="onSaveSettings()" [disabled]="isLocked" />
          <span class="toggle-text">服务器崩溃</span>
        </div>

        <div class="toggle-label">
          <input type="checkbox" class="toggle-switch" [(ngModel)]="notifications.serverUpdate" (change)="onSaveSettings()" [disabled]="isLocked" />
          <span class="toggle-text">服务器可用更新</span>
        </div>

        <div class="toggle-label" style="opacity: 0.6;">
          <input type="checkbox" class="toggle-switch" [(ngModel)]="notifications.serverJoin" [disabled]="true" />
          <span class="toggle-text">玩家加入（敬请期待）</span>
        </div>

      </div>
    </div>
  </div>

</div>
