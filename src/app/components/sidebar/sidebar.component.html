<div class="sidebar" style="display:flex;flex-direction:column;">
  <div class="sidebar-header" (click)="showServers = !showServers">
    <h3 style="margin:0;">服务器</h3>
    <span class="material-icons" style="font-size:20px;user-select:none;">
      {{ showServers ? 'expand_more' : 'chevron_right' }}
    </span>
    <div style="display:flex;gap:4px;margin-left:auto;" *ngIf="servers.length > 0" (click)="$event.stopPropagation()">
      <button class="btn btn-ghost" title="启动所有服务器" (click)="startAllServers()">
        <i class="material-icons">play_arrow</i>
      </button>
      <button class="btn btn-ghost" title="停止所有服务器" (click)="stopAllServers()">
        <i class="material-icons">stop</i>
      </button>
    </div>
  </div>
  
  <div class="sidebar-content" *ngIf="showServers">
    <div class="server-list" cdkDropList (cdkDropListDropped)="onDrop($event)">
      <div 
        *ngFor="let server of servers; trackBy: trackByServerId" 
        class="server-item" cdkDrag
        [class.selected]="selectedServerId === server.id"
        (click)="onServerClick(server)">
        <span class="server-status-icon" [ngClass]="getServerStatusClass(server)">
          <i class="material-icons">{{ getServerStatusIcon(server) }}</i>
        </span>
        <span 
          *ngIf="editingServerId !== server.id"
          class="server-name" 
          [class.editable]="!isServerBusy(server)"
          (dblclick)="onServerNameDoubleClick(server, $event)">
          {{ server.name }}
        </span>
        <input 
          *ngIf="editingServerId === server.id"
          type="text"
          class="form-control editing-server-name"
          [(ngModel)]="editingServerName"
          (keydown)="onServerNameKeydown($event, server)"
          (blur)="onServerNameBlur(server)">
        <button 
          *ngIf="servers.length > 1 && editingServerId !== server.id && (server.state || '').toLowerCase() === 'stopped'"
          class="delete-server-btn" 
          title="删除服务器"
          (click)="onDeleteServer(server, $event)">
          &#10006;
        </button>
      </div>
    </div>
  </div>
  
  <div class="sidebar-footer">
    <button 
      class="btn btn-ghost" 
      (click)="onAddServerClick()"
      title="添加服务器">
      <i class="material-icons">add</i>
      添加服务器
    </button>
    <button 
      class="btn btn-ghost" 
      (click)="onSettingsClick()"
      title="设置">
      <i class="material-icons">settings</i>
    </button>
    <!-- Logout button for web mode when authentication is enabled -->
    <button 
      *ngIf="isWebMode && authenticationEnabled"
      class="btn btn-ghost" 
      (click)="onLogoutClick()"
      title="登出">
      <i class="material-icons">logout</i>
    </button>
  </div>
</div>

<app-modal 
  [title]="'添加服务器'" 
  [show]="showAddModal" 
  (close)="onCancelAdd()">
  
  <!-- Mode Selection -->
  <div class="form-group">
    <div class="tabs import-mode-selector">
      <button 
        type="button" 
        class="btn tab" 
        [class.active]="importMode === 'create'"
        (click)="setImportMode('create')">
        <i class="material-icons">add</i>
        新建服务器
      </button>
      <button 
        type="button" 
        class="btn tab" 
        [class.active]="importMode === 'import'"
        (click)="setImportMode('import')">
        <i class="material-icons">file_upload</i>
        从备份导入
      </button>
      <button 
        type="button" 
        class="btn tab" 
        [class.active]="importMode === 'clone'"
        (click)="setImportMode('clone')">
        <i class="material-icons">content_copy</i>
        克隆现有服务器
      </button>
    </div>
  </div>

  <!-- Fixed height container for form content -->
  <div class="modal-form-content">
    <!-- Create New Server Form -->
    <div *ngIf="importMode === 'create'" class="form-group">
      <label class="form-control-label">服务器名称</label>
      <input 
        #serverNameInput 
        class="form-control" 
        [(ngModel)]="serverName" 
        name="serverName" 
        required 
        placeholder="输入服务器名称" 
        (keyup.enter)="onAddServer()"/>
    </div>

    <!-- Import from Backup Form -->
    <div *ngIf="importMode === 'import'">
      <div class="form-group">
        <label class="form-control-label">服务器名称</label>
        <input 
          class="form-control" 
          [(ngModel)]="serverName" 
          name="serverName" 
          required 
          placeholder="输入服务器名称"/>
      </div>
      <div class="form-group">
        <label class="form-control-label">备份文件</label>
        <div class="file-input-wrapper">
          <input 
            type="text" 
            class="form-control" 
            [(ngModel)]="selectedBackupFilePath"
            placeholder="输入文件路径或点击浏览"
            style="flex: 1;"/>
          <button 
            type="button" 
            class="btn btn-ghost" 
            (click)="selectBackupFile()"
            style="margin-left: 8px;">
            浏览
          </button>
        </div>
        <!-- Hidden file input for fallback -->
        <input 
          type="file" 
          accept=".zip"
          style="display: none;"
          (change)="onBackupFileSelect($event)"
          #backupFileInput/>
        <div class="form-control-label desc">选择要恢复的备份 ZIP 文件。您可以直接输入路径或点击浏览。</div>
      </div>
    </div>

    <!-- Clone Existing Server Form -->
    <div *ngIf="importMode === 'clone'">
      <div class="form-group">
        <label class="form-control-label">新服务器名称</label>
        <input 
          class="form-control" 
          [(ngModel)]="serverName" 
          name="serverName" 
          required 
          placeholder="输入克隆服务器的名称"/>
      </div>
      <div class="form-group">
        <label class="form-control-label">克隆自</label>
        <select 
          class="form-control" 
          [(ngModel)]="selectedServerToClone" 
          name="selectedServerToClone" 
          required>
          <option [ngValue]="null">选择要克隆的服务器...</option>
          <option *ngFor="let server of servers" [ngValue]="server">
            {{ server.name }}
          </option>
        </select>
        <div class="form-control-label desc">选择一个现有的服务器以复制所有设置。新服务器将具有相同的配置，但名称不同。</div>
      </div>
    </div>
  </div>

  <div class="action-group-modal" style="margin-top: 10px;">
    <button type="button" (click)="onCancelAdd()" class="btn btn-ghost">取消</button>
    <button 
      type="button" 
      (click)="onAddServer()" 
      [disabled]="!canAddServer()" 
      class="btn btn-ghost">
      {{ importMode === 'create' ? '添加' : importMode === 'import' ? '导入' : '克隆' }}
    </button>
  </div>
</app-modal>

<app-modal 
  [title]="'确认删除'" 
  [show]="showConfirmDeleteModal" 
  (close)="onCancelDelete()">
  <div class="modal-confirmation">
    您确定要删除 <span class="modal-target">{{ serverToDelete?.name }}</span>?
    <p class="warning-text">此操作无法撤销。</p>
  </div>
  <div class="action-group-modal">
    <button type="button" (click)="onCancelDelete()" class="btn">取消</button>
    <button type="button" (click)="onConfirmDelete()" class="btn btn-ghost">删除</button>
  </div>
</app-modal>

<app-modal
  [title]="'启动所有服务器'"
  [show]="showConfirmStartAllModal"
  (close)="showConfirmStartAllModal = false">
  <div class="modal-confirmation">
    确定要启动所有服务器吗？
  </div>
  <div class="action-group-modal">
    <button type="button" (click)="showConfirmStartAllModal = false" class="btn">取消</button>
    <button type="button" (click)="onConfirmStartAll()" class="btn btn-ghost">全部启动</button>
  </div>
</app-modal>

<app-modal
  [title]="'停止所有服务器'"
  [show]="showConfirmStopAllModal"
  (close)="showConfirmStopAllModal = false">
  <div class="modal-confirmation">
    确定要停止所有运行中的服务器吗？
  </div>
  <div class="action-group-modal">
    <button type="button" (click)="showConfirmStopAllModal = false" class="btn">取消</button>
    <button type="button" (click)="onConfirmStopAll()" class="btn btn-ghost">全部停止</button>
  </div>
</app-modal>
